<style>

  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--txt);font-family:-apple-system,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;}
  .wrap{max-width:1480px;margin:0 auto;padding:18px 22px 40px;}
  header h1{margin:0 0 4px;font-size:26px;letter-spacing:1px;}

  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;box-shadow:0 2px 8px rgba(20,29,55,.04);}
  #chart{height:760px;width:100%;}
  .side{padding:16px 16px 12px;}
  .side h2{margin:2px 0 4px;font-size:15px;}
  .side .hint{color:var(--sub);font-size:11.5px;margin-bottom:10px;}
  .row{margin:7px 0;cursor:pointer;border-radius:9px;padding:7px 9px;transition:background .15s;border:1px solid transparent;}
  .row:hover{background:var(--soft);}
  .row.active{background:var(--soft);border-color:var(--line);}
  .row .top{display:flex;justify-content:space-between;align-items:baseline;font-size:13.5px;margin-bottom:5px;}
  .row .nm{font-weight:600;} .row .ct{color:var(--sub);font-size:12px;}
  .bar{height:11px;border-radius:7px;background:var(--soft);overflow:hidden;}
  .bar > div{height:100%;border-radius:7px;}
  .row.dom .nm::after{content:" ◄ 主导";color:#c07d0a;font-size:11px;font-weight:700;}
  .names{color:var(--sub);font-size:11px;margin-top:5px;line-height:1.5;display:none;}
  .row.active .names{display:block;}
  .clearbtn{margin:4px 2px 0;font-size:11.5px;color:var(--sub);cursor:pointer;user-select:none;}
  .clearbtn:hover{color:var(--link);text-decoration:underline;}
  footer{margin-top:16px;color:var(--sub);font-size:12px;line-height:1.75;border-top:1px solid var(--line);padding-top:12px;}
  footer .miss{color:#c07d0a;} footer b{color:var(--sub2);}
  .legend{display:flex;gap:14px;flex-wrap:wrap;margin:8px 2px 0;color:var(--sub);font-size:11.5px;}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:5px;vertical-align:middle;}
  .sizeleg{margin:10px 2px 0;color:var(--sub);font-size:11.5px;line-height:1.5;}
  .sizeleg b{color:var(--sub2);}
</style>
