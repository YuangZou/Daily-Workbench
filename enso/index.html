    // 序列
    opts.series.forEach(s=>{ if(hidden.has(s.key))return; const ax=s.axis||0;
      if(s.type==="bar"){
        const bw=Math.max(1,(W-mL-mR)/xs.length*0.8);
        for(let i=i0;i<i1;i++){const v=D[s.key][i]; if(v==null)continue;
          const y0=Y(0,ax),y1v=Y(v,ax);
          svg.appendChild(el("rect",{x:X(i)-bw/2,y:Math.min(y0,y1v),width:bw,height:Math.abs(y1v-y0),
            fill:s.color|| (v>=0?(s.pos||EL):(s.neg||LA)), opacity:s.op||.8}));}
      } else {
        // area 正负分色
        if(s.type==="area"){
          for(const sign of [1,-1]){
            let d="",open=false;
            for(let i=i0;i<i1;i++){const v=D[s.key][i];
              const vv=(v!=null && ((sign>0&&v>=0)||(sign<0&&v<0)))?v:null;
              if(vv!=null){ if(!open){d+=`M${X(i)} ${Y(0,ax)} `;open=true;} d+=`L${X(i)} ${Y(vv,ax)} `;}
              else if(open){d+=`L${X(i-1)} ${Y(0,ax)} Z `;open=false;}}
            if(open)d+=`L${X(i1-1)} ${Y(0,ax)} Z`;
            if(d)svg.appendChild(el("path",{d,fill:sign>0?EL:LA,opacity:.72}));
          }
        }
        // 线
        let d="",open=false;
        for(let i=i0;i<i1;i++){const v=D[s.key][i];
          if(v!=null){d+=(open?"L":"M")+X(i)+" "+Y(v,ax)+" ";open=true;}else open=false;}
        svg.appendChild(el("path",{d,fill:"none",stroke:s.color,"stroke-width":s.lw|| (s.type==="area"?1.1:1.4)}));
      }
    });
    // 右轴刻度
    if(opts.series.some(s=>(s.axis||0)===1)){const[a,b]=r1; const st=niceStep((b-a)/4);
      for(let g=Math.ceil(a/st)*st; g<=b; g+=st) svg.appendChild(txt(W-mR+4,Y(g,1)+3,g.toFixed(1),{fill:"#9aa3af","font-size":10}));}
    // 悬停
    const hover=el("line",{x1:0,x2:0,y1:mT,y2:H-mB,stroke:"#111827","stroke-width":.8,opacity:0});
    svg.appendChild(hover);
    svg.onpointermove=ev=>{const pt=svg.getBoundingClientRect();
      const px=(ev.clientX-pt.left)/pt.width*W;
      let bi=i0; let bd=1e9; for(let i=i0;i<i1;i++){const dd=Math.abs(X(i)-px); if(dd<bd){bd=dd;bi=i;}}
      hover.setAttribute("x1",X(bi));hover.setAttribute("x2",X(bi));hover.setAttribute("opacity",.5);
      let rows=opts.series.filter(s=>!hidden.has(s.key)).map(s=>`<i style="background:${s.color||EL}"></i>${s.label}: <b>${fmt(D[s.key][bi])}</b>`).join("<br>");
      tip.innerHTML=`<b>${D.dates[bi].slice(0,7)}</b><br>${rows}`;
      tip.style.opacity=1; tip.style.left=(ev.clientX+14)+"px"; tip.style.top=(ev.clientY+12)+"px";};
    svg.onpointerleave=()=>{tip.style.opacity=0;hover.setAttribute("opacity",0);};
  }
  function el(t,a){const e=document.createElementNS(svgNS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
  function txt(x,y,s,a){const e=el("text",a||{});e.setAttribute("x",x);e.setAttribute("y",y);e.textContent=s;return e;}
  draw();
  return {setRange:r=>{range=r;draw();}, toggle:k=>{hidden.has(k)?hidden.delete(k):hidden.add(k);draw();}, hidden};
}
function niceStep(x){const p=Math.pow(10,Math.floor(Math.log10(x)));const f=x/p;return (f<1.5?1:f<3?2:f<7?5:10)*p;}

// KPI 卡片
const kpis=[
  ["当前 ENSO 状态","弱厄尔尼诺","#d9352a","截至 2026-05"],
  ["ONI(海洋 Niño)","+0.88°C","#111827","3 月滑动平均"],
  ["Niño3.4 距平","LAST_N34","#111827","单月"],
  ["SOI(大气)","LAST_SOI","#111827","标准化"],
  ["MEI.v2(综合)","LAST_MEI","#111827","多变量"],
];
function lastV(k){for(let i=N-1;i>=0;i--)if(D[k][i]!=null)return D[k][i];return null;}
document.getElementById("status").innerHTML=kpis.map(k=>{
  let v=k[1], sub=k[3], col=k[2];
  if(v==="LAST_N34"){v=fmt(lastV("N34"))+"°C";}
  else if(v==="LAST_SOI"){v=fmt(lastV("SOI"));}
  else if(v==="LAST_MEI"){v=fmt(lastV("MEI_v2"));}
  return `<div class="card kpi"><div class="l">${k[0]}</div><div class="v" style="color:${col}">${v} <small>${sub}</small></div></div>`;
}).join("");

// 面板构建器
function panel(title,desc,builder,ranges){
  const wrap=document.getElementById("app");
  const p=document.createElement("div");p.className="card panel";
  p.innerHTML=`<h2>${title}</h2><p class="desc">${desc}</p>`;
  const legendHost=document.createElement("div");legendHost.className="legend";
  const ctl=document.createElement("div");ctl.className="ctl";
  const host=document.createElement("div");
  p.appendChild(legendHost);p.appendChild(ctl);p.appendChild(host);wrap.appendChild(p);
  const chart=builder(host);
  (ranges||[[0,"全部"],[30,"近30年"],[12,"近12年"]]).forEach((r,k)=>{
    const b=document.createElement("button");b.textContent=r[1];if(k===0)b.classList.add("on");
    b.onclick=()=>{ctl.querySelectorAll("button").forEach(x=>x.classList.remove("on"));b.classList.add("on");chart.setRange(r[0]);};
    ctl.appendChild(b);
  });
  return {chart,legendHost};
}
function legend(host,chart,series){
  host.innerHTML="";
  series.forEach(s=>{const sp=document.createElement("span");
    sp.innerHTML=`<i style="background:${s.color||EL}"></i>${s.label}`;
    sp.onclick=()=>{chart.toggle(s.key);sp.classList.toggle("off",chart.hidden.has(s.key));};
    host.appendChild(sp);});
}

// 1) ONI 全历史(区域填色)
panel("① ONI 海洋 Niño 指数 —— 厄尔尼诺(红)/ 拉尼娜(蓝)历史",
  "ENSO 官方判据。虚线为 弱(±0.5)/ 中(±1.0)/ 强(±1.5)/ 极强(±2.0)阈值。",
  h=>Chart(h,{h:300,range:0,series:[{key:"ONI",type:"area",color:"#111827",label:"ONI"}],thresh:[0.5,1,1.5,2]}));

// 2) 四个 Niño 区
(function(){const series=[{key:"N12",color:"#7b3294",label:"Niño 1+2"},{key:"N3",color:"#e66101",label:"Niño 3"},{key:"N4",color:"#1a9641",label:"Niño 4"},{key:"N34",color:"#111827",label:"Niño 3.4"}];
 const {chart,legendHost}=panel("② 四个 Niño 区海温距平","东(1+2)→中(3.4)→西(4)海区对比,反映事件的空间型态。",
   h=>Chart(h,{h:270,range:12,series:series.map(s=>({...s,type:"line"}))}),[[12,"近12年"],[30,"近30年"],[0,"全部"]]);
 legend(legendHost,chart,series);})();

// 3) SOI vs ONI 反相关
(function(){const series=[{key:"SOI",type:"bar",axis:0,color:null,pos:LA,neg:EL,label:"SOI(大气,左轴)"},{key:"ONI",type:"line",axis:1,color:"#111827",label:"ONI(海洋,右轴)",lw:1.6}];
 const {chart}=panel("③ SOI vs ONI —— 海气耦合的镜像反相关","SOI 为负(信风偏弱)对应厄尔尼诺(ONI 为正),二者互为印证。",
   h=>Chart(h,{h:260,range:30,mR:40,series}),[[30,"近30年"],[0,"全部"]]);})();

// 4) MEI.v2
panel("④ MEI.v2 多变量 ENSO 综合指数","融合海温、气压、纬向/经向风、海表温、云量 5 要素,口径比单一 SST 更全面。",
  h=>Chart(h,{h:240,range:30,series:[{key:"MEI_v2",type:"bar",pos:EL,neg:LA,label:"MEI.v2"}],thresh:[0.5,1,1.5]}),[[30,"近30年"],[0,"全部"]]);

// 5) TNI vs ONI 类型
(function(){const series=[{key:"ONI",color:"#111827",label:"ONI(强度)",lw:1.6},{key:"TNI",color:"#b8006d",label:"TNI(类型:+东部型 / −中部型)",lw:1.3}];
 const {chart,legendHost}=panel("⑤ Trans-Niño 指数(TNI)vs ONI —— 强度 × 类型",
   "ONI 给强度,TNI 给类型:TNI>0 偏东部型(EP,如 1997/98),TNI<0 偏中部型(CP,如 2009/10)。",
   h=>Chart(h,{h:250,range:30,series:series.map(s=>({...s,type:"line"}))}),[[30,"近30年"],[0,"全部"]]);
 legend(legendHost,chart,series);})();
